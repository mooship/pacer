name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 7 * * 6'

permissions:
  contents: read

jobs:
  build-and-test:
    name: Lint, Typecheck, Test, and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Typecheck and Build Artifacts
        uses: actions/cache@v4
        with:
          path: |
            packages/core/node_modules/.cache/tsc
            apps/tui/node_modules/.cache/tsc
            apps/web/node_modules/.cache/tsc
            apps/web/node_modules/.vite
          key: build-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            build-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            build-${{ runner.os }}-

      - name: Lint and Format Check
        run: pnpm biome ci .

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test

      - name: Build
        run: pnpm -r build
